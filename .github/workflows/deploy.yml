name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
  NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID }}
  NEXT_PUBLIC_META_PIXEL_ID: ${{ vars.NEXT_PUBLIC_META_PIXEL_ID }}
  NEXT_PUBLIC_LEAD_PROXY_URL: ${{ vars.NEXT_PUBLIC_LEAD_PROXY_URL }}
  NEXT_PUBLIC_LEAD_INTEGRATION_NAME: ${{ vars.NEXT_PUBLIC_LEAD_INTEGRATION_NAME }}
  NEXT_PUBLIC_BENEFIT_ACTIVATE_URL: ${{ vars.NEXT_PUBLIC_BENEFIT_ACTIVATE_URL }}
  TINA_TOKEN: ${{ secrets.TINA_TOKEN }}

jobs:
  build:
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Fails fast before tina:build / next build if GitHub Variables or Secrets are missing or invalid.
      # Tracking: GA4 + Google Ads are loaded via GTM — NEXT_PUBLIC_GTM_ID must be set (e.g. GTM-KHQP88V).
      # Meta Pixel: NEXT_PUBLIC_META_PIXEL_ID must be numeric. Tina: client id + token required for CMS build.
      - name: Validate required environment variables for build
        run: |
          set -euo pipefail
          fail() { echo "::error::$1" >&2; exit 1; }

          require_nonempty() {
            local name="$1"
            [ -n "${!name:-}" ] || fail "Missing or empty required variable: $name (set in GitHub Actions → Settings → Secrets and variables → Actions)"
          }

          require_regex() {
            local name="$1"
            local pattern="$2"
            local val="${!name:-}"
            [[ "$val" =~ $pattern ]] || fail "$name has invalid format (expected pattern: $pattern). Current value length: ${#val}"
          }

          require_https_url() {
            local name="$1"
            local val="${!name:-}"
            [[ "$val" == https://* ]] || fail "$name must start with https:// (got: ${val:0:40})"
          }

          echo "Checking TinaCMS (build-time)…"
          require_nonempty NEXT_PUBLIC_TINA_CLIENT_ID
          require_nonempty TINA_TOKEN

          echo "Checking Google Tag Manager container…"
          require_nonempty NEXT_PUBLIC_GTM_ID
          require_regex NEXT_PUBLIC_GTM_ID '^GTM-[A-Za-z0-9]+$'

          echo "Checking Meta Pixel…"
          require_nonempty NEXT_PUBLIC_META_PIXEL_ID
          require_regex NEXT_PUBLIC_META_PIXEL_ID '^[0-9]+$'

          echo "Checking lead proxy and convênios activation…"
          require_nonempty NEXT_PUBLIC_LEAD_PROXY_URL
          require_https_url NEXT_PUBLIC_LEAD_PROXY_URL
          require_nonempty NEXT_PUBLIC_LEAD_INTEGRATION_NAME
          require_nonempty NEXT_PUBLIC_BENEFIT_ACTIVATE_URL
          require_https_url NEXT_PUBLIC_BENEFIT_ACTIVATE_URL

          echo "✅ All required environment variables for production build are present and well-formed."

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          NEXT_PUBLIC_GTM_ID: ${{ vars.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_META_PIXEL_ID: ${{ vars.NEXT_PUBLIC_META_PIXEL_ID }}
          NEXT_PUBLIC_LEAD_PROXY_URL: ${{ vars.NEXT_PUBLIC_LEAD_PROXY_URL }}
          NEXT_PUBLIC_LEAD_INTEGRATION_NAME: ${{ vars.NEXT_PUBLIC_LEAD_INTEGRATION_NAME }}
          NEXT_PUBLIC_BENEFIT_ACTIVATE_URL: ${{ vars.NEXT_PUBLIC_BENEFIT_ACTIVATE_URL }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: ./out
          retention-days: 1

  deploy:
    needs: build
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: ./out

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync HTML and XML (short cache)
        run: |
          aws s3 sync ./out s3://${{ env.AWS_S3_BUCKET }} \
            --delete \
            --cache-control 'public, max-age=3600' \
            --exclude '*' \
            --include '*.html' \
            --include '*.xml' \
            --include '*.txt' \
            --include '*.ico' \
            --exclude '.git*'

      - name: Sync static assets (long cache, immutable)
        run: |
          aws s3 sync ./out s3://${{ env.AWS_S3_BUCKET }} \
            --cache-control 'public, max-age=31536000, immutable' \
            --exclude '*.html' \
            --exclude '*.xml' \
            --exclude '*.txt' \
            --exclude '*.ico' \
            --exclude '.git*'

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment notification
        if: success()
        run: echo "✅ Successfully deployed to ${{ env.AWS_S3_BUCKET }}"

      - name: Deployment failed notification
        if: failure()
        run: echo "❌ Deployment to AWS S3 failed"
