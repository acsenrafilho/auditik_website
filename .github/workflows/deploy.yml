name: Deploy to AWS S3 + CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
  NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
  NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
  NEXT_PUBLIC_META_PIXEL_ID: ${{ vars.NEXT_PUBLIC_META_PIXEL_ID }}
  NEXT_PUBLIC_GOOGLE_ADS_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_ADS_ID }}
  NEXT_PUBLIC_GOOGLE_ADS_LABEL_CONTACT: ${{ vars.NEXT_PUBLIC_GOOGLE_ADS_LABEL_CONTACT }}
  NEXT_PUBLIC_GOOGLE_ADS_LABEL_APPOINTMENT: ${{ vars.NEXT_PUBLIC_GOOGLE_ADS_LABEL_APPOINTMENT }}
  NEXT_PUBLIC_GOOGLE_ADS_LABEL_WHATSAPP: ${{ vars.NEXT_PUBLIC_GOOGLE_ADS_LABEL_WHATSAPP }}
  NEXT_PUBLIC_GOOGLE_ADS_LABEL_PHONE: ${{ vars.NEXT_PUBLIC_GOOGLE_ADS_LABEL_PHONE }}
  TINA_TOKEN: ${{ secrets.TINA_TOKEN }}

jobs:
  build-and-deploy:
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate Tina environment variables
        run: |
          if [ -z "$NEXT_PUBLIC_TINA_CLIENT_ID" ]; then
            echo "Missing environment secret: NEXT_PUBLIC_TINA_CLIENT_ID"
            exit 1
          fi
          if [ -z "$TINA_TOKEN" ]; then
            echo "Missing environment secret: TINA_TOKEN"
            exit 1
          fi
          if [ -z "$AWS_S3_BUCKET" ]; then
            echo "Missing environment variable: AWS_S3_BUCKET"
            exit 1
          fi
          echo "Environment variables detected for CI build"

      - name: Build Next.js
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync HTML and XML (short cache)
        run: |
          aws s3 sync ./out s3://${{ env.AWS_S3_BUCKET }} \
            --delete \
            --cache-control 'public, max-age=3600' \
            --exclude '*' \
            --include '*.html' \
            --include '*.xml' \
            --include '*.txt' \
            --exclude '.git*'

      - name: Sync static assets (long cache, immutable)
        run: |
          aws s3 sync ./out s3://${{ env.AWS_S3_BUCKET }} \
            --cache-control 'public, max-age=31536000, immutable' \
            --exclude '*.html' \
            --exclude '*.xml' \
            --exclude '*.txt' \
            --exclude '.git*'

      # - name: Invalidate CloudFront cache
      #   run: |
      #     aws cloudfront create-invalidation \
      #       --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
      #       --paths "/*"

      - name: Deployment notification
        if: success()
        run: echo "✅ Successfully deployed to ${{ env.AWS_S3_BUCKET }}"

      - name: Deployment failed notification
        if: failure()
        run: echo "❌ Deployment to AWS S3 failed"
