name: lead-control
description: "Adaptação padrão para o blog da Lead Control"

brand:
  nome: "Lead Control"
  parceiro: "Plataforma de CRM e gestão de leads para clínicas de saúde"
  contato: "contato@leadcontrol.ia.br"
  endereco: "Avenida Paulista, 1106, Bela Vista - São Paulo/SP"
  site: "https://www.leadcontrol.ia.br"
  app: "https://app.leadcontrol.ia.br"
  redes:
    facebook: "https://www.facebook.com/leadcontrolcrm"
    instagram: "https://www.instagram.com/leadcontrolcrm"
    linkedin: "https://www.linkedin.com/company/leadcontrolcrm"

voice:
  tom: "Profissional, corporativo e orientado a resultados de negócio"
  publico_alvo: "Gestores, diretores, donos de clínicas de saúde e equipes de recepção, comercial e marketing"
  estilo: "Educativo, prático, com foco em métricas (ROI, conversão, tempo de resposta) e sem jargão técnico de programação"

adaptation:
  estrategia: |
    Antes de reescrever, analise o artigo original identificando:
    - Menções a concorrentes (CRMs, automações de WhatsApp ou plataformas de captação para clínicas)
    - Dados desatualizados ou informações que precisam de contextualização para o mercado de saúde no Brasil
    - Oportunidades de CTA alinhadas ao funil (consciência do problema → consideração → demonstração)
    - Referências e estudos relevantes que devem ser preservados
    - Oportunidades de links internos para as landing pages e páginas institucionais do Lead Control
    Depois, reescreva o conteúdo aplicando as regras de adaptação.
  regras:
    - "Troque linguagem e informações para o contexto da Lead Control, removendo menções a concorrentes."
    - "Posicione o Lead Control como camada de comunicação e follow-up que complementa (e não substitui) prontuários eletrônicos e CRMs genéricos."
    - "Foque nas dores de gestão: leads sumindo no WhatsApp, gargalos na recepção, desperdício de tráfego pago e falta de visibilidade de conversão."
    - "Preserve estrutura markdown clara e legível (títulos, subtítulos, listas)."
    - "Inclua exemplos práticos para clínicas de saúde (audiologia, odontologia, estética e outras especialidades)."
    - "Quando o tema for audiologia ou odontologia, mencione e link para as landing pages internas correspondentes. Faça isso para qualquer referência a especialidades que já esteja implementada no Lead Control."
    - "O resultado deve ser útil para quem busca organizar leads e aumentar agendamentos, com foco em confiança, segurança, facilidade de uso e clareza."
    - "O corpo deve terminar com CTA alinhado à empresa."
    - "Tomar cuidado com a acentuação da língua portuguesa."
    - "Não inclua marcadores ```yaml para o cabeçalho. Deve estar totalmente direcionado para a estrutura de cabeçalho presente no arquivo content/blog/.template.md."
    - 'Se houver referências de sites e artigos relevantes, inclua-as no corpo e adicione seção final "Referências" com links de acesso.'
  cta_final: |
    Aloque o CTA mais adequado para o contexto do artigo. Sugestões são:
    1) Agende uma demonstração gratuita do Lead Control e veja como transformar cliques em agendamentos.
    2) Entre em contato pelo e-mail contato@leadcontrol.ia.br para falar com um especialista.
    3) Cadastre sua clínica e comece a organizar leads e follow-up em um único fluxo.
    4) Leia mais sobre como o Lead Control atua em centros auditivos ou clínicas odontológicas (ou outras especialidades que já esteja implementada no Lead Control).
    5) Siga nossas redes sociais e fique por dentro de novidades sobre gestão de leads na saúde.
  instrucoes_extras: |
    Links internos úteis (usar quando fizer sentido no contexto):
    - Página principal: https://www.leadcontrol.ia.br/
    - Demonstração/contato: https://www.leadcontrol.ia.br/#contato
    - Centros auditivos: https://www.leadcontrol.ia.br/pages/para-clinicas/centros-auditivos.html
    - Odontologia: https://www.leadcontrol.ia.br/pages/para-clinicas/odonto.html
    - Cadastro de clínica: https://www.leadcontrol.ia.br/pages/cadastrar-clinica.html
    - Índice do blog: https://www.leadcontrol.ia.br/pages/blog/index.html

    Diferenciais a reforçar quando pertinente:
    - Centralização de WhatsApp, Instagram, site e anúncios em um fluxo único
    - Resposta rápida, priorização de leads e follow-up com SLA
    - Histórico completo de conversas para recepção e comercial
    - Visibilidade de origem, conversão e ROI de campanhas
    - Automação e IA conversacional humanizada (não robôs engessados)
    - Operação simples para equipes não técnicas

output:
  mode: full
  author: "Equipe Lead Control"
  featured_image: "/assets/images/blog/leadcontrol-blog-post-000.jpg"
  topics_permitidos:
    - gestao-leads
    - crm-clinicas
    - audiologia
    - odontologia
    - estetica
    - medicina-geral
    - medicina-interna
    - medicina-pediatrica
    - medicina-geriatrica
    - medicina-cardiologica
    - medicina-neurologica
    - medicina-endocrinologica
    - medicina-ginecologica
    - medicina-hematologica
    - automacao-atendimento
    - conversao-agendamentos
    - marketing-digital-saude
  incluir_referencias: true

model:
  name: "gemini-2.5-flash-lite"
